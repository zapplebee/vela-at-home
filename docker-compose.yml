#
# Vela at Home — single-node Docker Compose stack
# See docs/setup.md before starting.

services:

  # ── Core API server ──────────────────────────────────────────────────────────
  server:
    image: target/vela-server:v0.27.3
    container_name: vela-server
    networks: [vela, proxy]
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      CACHE_DRIVER: redis
      CACHE_ADDR: "redis://redis:6379"
      DATABASE_DRIVER: postgres
      QUEUE_DRIVER: redis
      QUEUE_ADDR: "redis://redis:6379"
      SCM_DRIVER: github
      SCM_CONTEXT: "continuous-integration/vela"
      SECRET_VAULT: "false"
      VELA_LOG_LEVEL: info
      VELA_USER_REFRESH_TOKEN_DURATION: 90m
      VELA_USER_ACCESS_TOKEN_DURATION: 60m
      VELA_WORKER_AUTH_TOKEN_DURATION: 3m
      VELA_DISABLE_WEBHOOK_VALIDATION: "true"
      SCM_APP_ID: "${SCM_APP_ID}"
      SCM_APP_PRIVATE_KEY: "${SCM_APP_PRIVATE_KEY}"
      SCM_APP_WEBHOOK_SECRET: "${SCM_APP_WEBHOOK_SECRET}"
      VELA_ENABLE_SECURE_COOKIE: "true"
      VELA_REPO_ALLOWLIST: "*"
      VELA_SCHEDULE_ALLOWLIST: "*"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vela-server.rule=Host(`vela.prettybird.zapplebee.online`) && (PathPrefix(`/api`) || PathPrefix(`/authenticate`) || PathPrefix(`/login`) || PathPrefix(`/logout`) || PathPrefix(`/health`) || PathPrefix(`/webhook`) || PathPrefix(`/_ws`) || PathPrefix(`/_services`) || PathPrefix(`/token-refresh`) || PathPrefix(`/validate-token`) || PathPrefix(`/validate-oauth`) || PathPrefix(`/metrics`) || PathPrefix(`/version`) || PathPrefix(`/badge`) || PathPrefix(`/status`))"
      - "traefik.http.routers.vela-server.entrypoints=websecure"
      - "traefik.http.routers.vela-server.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vela-server.priority=10"
      - "traefik.http.services.vela-server.loadbalancer.server.port=8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Build executor ───────────────────────────────────────────────────────────
  worker:
    image: target/vela-worker:v0.27.3
    container_name: vela-worker
    networks: [vela]
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      EXECUTOR_DRIVER: linux
      QUEUE_DRIVER: redis
      QUEUE_ADDR: "redis://redis:6379"
      VELA_BUILD_LIMIT: 2
      VELA_BUILD_TIMEOUT: 30m
      VELA_LOG_LEVEL: info
      VELA_RUNTIME_DRIVER: docker
      VELA_RUNTIME_PRIVILEGED_IMAGES: "target/vela-docker"
      VELA_EXECUTOR_ENFORCE_TRUSTED_REPOS: "true"
      VELA_EXECUTOR_OUTPUTS_IMAGE: "alpine:latest"
      VELA_SERVER_ADDR: "http://server:8080"
      WORKER_ADDR: "http://worker:8080"
      WORKER_CHECK_IN: 2m
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - server

  # ── Web UI ───────────────────────────────────────────────────────────────────
  ui:
    image: target/vela-ui:v0.27.3
    container_name: vela-ui
    networks: [vela, proxy]
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vela-ui.rule=Host(`vela.prettybird.zapplebee.online`)"
      - "traefik.http.routers.vela-ui.entrypoints=websecure"
      - "traefik.http.routers.vela-ui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vela-ui.priority=1"
      - "traefik.http.services.vela-ui.loadbalancer.server.port=80"
    restart: unless-stopped
    depends_on:
      - server

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vela-postgres
    networks: [vela]
    environment:
      POSTGRES_DB: vela
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vela-redis
    networks: [vela]
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  vela:
  proxy:
    external: true
