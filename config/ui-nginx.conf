# Vela UI — static file server only.
# Routing for /login, /authenticate, /api/v1/ etc. is handled upstream
# by Traefik, which routes those paths to vela-server at higher priority.
# Nginx does not proxy to the backend — avoids NAT hairpin and DNS caching issues.

server {
    listen 80;
    root /usr/share/nginx/html;
    server_name vela;

    server_tokens off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self' https://vela.prettybird.zapplebee.online; img-src 'self' https://vela.prettybird.zapplebee.online; style-src 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /health {
        access_log off;
        return 204;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
}
